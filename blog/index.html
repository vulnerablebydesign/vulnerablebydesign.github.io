<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hack the Cube - Creative stories of Chell's adventures through Hack The Box challenges, guided by GlaDOS, Wheatley, and Cave Johnson.">
  <meta name="theme-color" content="#0a0a0f">
  <title>Hack the Cube | Test Chamber Archives</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Hack the Cube">
  <meta property="og:description" content="Creative stories of Chell's adventures through Hack The Box challenges">
  <meta property="og:image" content="/blog/assets/images/hack-the-cube-header.png">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/blog/assets/images/favicon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/blog/assets/styles/blog.css">
</head>
<body>
  <div class="blog-container">

    <!-- Header -->
    <header class="blog-header">
      <a href="#posts" onclick="event.preventDefault(); document.getElementById('posts').scrollIntoView({behavior: 'smooth'})">
        <img
          src="/blog/assets/images/hack-the-cube-header.png"
          alt="Hack the Cube - Portal characters around a hacked Companion Cube"
          class="header-image"
        >
      </a>
      <p class="blog-subtitle">Test Chamber Archives</p>
      <button class="press-start" onclick="document.getElementById('posts').scrollIntoView({behavior: 'smooth'})">PRESS START</button>
    </header>

    <!-- Navigation -->
    <nav class="blog-nav" aria-label="Blog navigation">
      <a href="/blog/" class="nav-link active">All Posts</a>
      <a href="/blog/tags/" class="nav-link">Tags</a>
      <a href="/" class="nav-link">Main Terminal</a>
    </nav>

    <!-- Posts Grid -->
    <main id="posts">
      <section class="posts-grid" id="posts-grid" aria-label="Blog posts">
        <p id="posts-loading" style="text-align:center;color:var(--text-secondary);padding:2rem;">Loading test chambers…</p>
      </section>

      <!-- Pagination -->
      <nav class="pagination" aria-label="Pagination">
        <a href="#" class="pagination-link disabled">&lt;&lt; Previous</a>
        <span class="pagination-current">Page 1 of 1</span>
        <a href="#" class="pagination-link disabled">Next &gt;&gt;</a>
      </nav>
    </main>

    <!-- Footer -->
    <footer class="blog-footer">
      <p class="footer-text">
        Test Chamber Archives maintained by
        <a href="/" class="footer-link">Aperture Science Enrichment Center</a>
      </p>
      <p class="footer-text" style="font-size: 0.8rem; color: var(--text-dim);">
        The cake is still a lie. For science.
      </p>
    </footer>

  </div>

  <script>
    const CHARACTER_TAGS = new Set([
      'glados', 'wheatley', 'fact-sphere', 'curiosity-core', 'adventure-sphere',
      'anger-core', 'cave', 'cavejohnson', 'morality-core', 'space-sphere'
    ]);

    function getTagClass(tag) {
      if (tag === 'first-blood') return 'tag first-blood-tag';
      return CHARACTER_TAGS.has(tag) ? `tag ${tag}` : 'tag';
    }

    function getTagStyle(tag) {
      if (tag === 'first-blood') {
        return ' style="background: linear-gradient(90deg, rgba(231,29,54,0.4), rgba(255,159,28,0.4)); color: white; font-weight: 700;"';
      }
      return '';
    }

    function renderPostCard(post) {
      const tags = (post.cardTags || post.tags)
        .map(t => `<a href="/blog/tags/tag.html?tag=${encodeURIComponent(t)}" class="${getTagClass(t)}"${getTagStyle(t)}>${t}</a>`)
        .join('\n              ');

      return `<article class="post-card">
          <a href="/blog/posts/${post.slug}/" class="post-card-image-link" aria-label="${post.title}">
            <picture>
              <source type="image/webp" srcset="/blog/posts/${post.slug}/images/header-800w.webp">
              <img src="/blog/posts/${post.slug}/images/header.png" alt="${post.title}" class="post-card-image" loading="lazy">
            </picture>
          </a>
          <div class="post-card-content">
            <a href="/blog/posts/${post.slug}/" class="post-card-link">Enter Test Chamber</a>
            <div class="post-card-meta">
              <span class="post-date">${post.dateFormatted}</span>
              <span class="post-difficulty ${post.difficultyClass}">${post.difficulty}</span>
            </div>
            <p class="post-card-excerpt">${post.excerpt}</p>
            <div class="tags-container">
              ${tags}
            </div>
          </div>
        </article>`;
    }

    async function init() {
      try {
        const response = await fetch('/blog/posts.json');
        const posts = await response.json();
        const grid = document.getElementById('posts-grid');
        grid.innerHTML = posts.map(renderPostCard).join('\n\n        ');
      } catch (err) {
        document.getElementById('posts-grid').innerHTML =
          '<p style="text-align:center;color:var(--error-red);padding:2rem;">Failed to load test chambers.</p>';
      }
    }

    init();
  </script>
</body>
</html>
